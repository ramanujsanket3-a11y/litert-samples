name: Compile LiteRT Mobile Server

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK Environment
        uses: android-actions/setup-android@v3

      - name: Set Execution Permissions
        run: |
          chmod +x gradlew
          chmod +x gradlew.bat
        working-directory: ./compiled_model_api/text_classification/kotlin_cpu/android

      # Compiles the classes and structural components directly to bypass asset validation
      - name: Run Development Compilation
        run: ./gradlew assembleDebug -x test --no-daemon
        working-directory: ./compiled_model_api/text_classification/kotlin_cpu/android

      - name: Output Mobile APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteRT-Server-App
          path: compiled_model_api/text_classification/kotlin_cpu/android/app/build/outputs/apk/debug/app-debug.apk
          
