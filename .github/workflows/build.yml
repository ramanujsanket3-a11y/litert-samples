name: Compile LiteRT Mobile Server

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK Environment
        uses: android-actions/setup-android@v3

      # Creates the dummy placeholder asset Google's compiler checks for
      - name: Inject Placeholder Model Asset
        run: |
          mkdir -p compiled_model_api/text_classification/kotlin_cpu/android/app/src/main/assets
          echo "placeholder" > compiled_model_api/text_classification/kotlin_cpu/android/app/src/main/assets/gemma-2b-it-cpu-int4.litert
          echo "placeholder" > compiled_model_api/text_classification/kotlin_cpu/android/app/src/main/assets/gemma-2b-it-gpu-int4.litert

      - name: Set Execution Permissions
        run: |
          chmod +x gradlew
          chmod +x gradlew.bat
        working-directory: ./compiled_model_api/text_classification/kotlin_cpu/android

      - name: Run Production APK Assembly
        run: ./gradlew assembleDebug --no-daemon
        working-directory: ./compiled_model_api/text_classification/kotlin_cpu/android

      - name: Output Mobile APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteRT-Server-App
          path: compiled_model_api/text_classification/kotlin_cpu/android/app/build/outputs/apk/debug/app-debug.apk
          
