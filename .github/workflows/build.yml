name: Compile LiteRT Mobile Server

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Build Gradle Elements
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Set Execution Permissions
        run: chmod +x gradlew
        working-directory: ./compiled_model_api/text_classification/kotlin_cpu/android

      - name: Run Production APK Assembly
        run: ./gradlew assembleDebug
        working-directory: ./compiled_model_api/text_classification/kotlin_cpu/android

      - name: Output Mobile APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteRT-Server-App
          path: compiled_model_api/text_classification/kotlin_cpu/android/app/build/outputs/apk/debug/app-debug.apk
          
