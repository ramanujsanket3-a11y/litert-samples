name: Compile LiteRT Mobile Server

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Fixes the missing Android SDK / ANDROID_HOME location error natively
      - name: Setup Android SDK Environment
        uses: android-actions/setup-android@v3

      # Fixes any underlying Bazel dependency compilation blocks
      - name: Set up Bazel Build Core
        uses: bazel-contrib/setup-bazel@v0.19.0
        with:
          bazel-version: '6.x'

      - name: Cache Build Gradle Elements
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Set Execution Permissions
        run: |
          chmod +x gradlew
          chmod +x gradlew.bat
        working-directory: ./compiled_model_api/text_classification/kotlin_cpu/android

      # Run clean assembly build with absolute environment arguments
      - name: Run Production APK Assembly
        run: ./gradlew assembleDebug --no-daemon
        working-directory: ./compiled_model_api/text_classification/kotlin_cpu/android

      - name: Output Mobile APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteRT-Server-App
          path: compiled_model_api/text_classification/kotlin_cpu/android/app/build/outputs/apk/debug/app-debug.apk
          
